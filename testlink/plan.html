<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Easy Gym Plan</title>
  <meta name="description" content="Open this Easy Gym training plan.">
  <meta property="og:title" content="Easy Gym Plan">
  <meta property="og:description" content="Open this Easy Gym training plan.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/icon-512.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Easy Gym Plan">
  <meta name="twitter:description" content="Open this Easy Gym training plan.">
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-align:center;padding:24px;}
    .card{max-width:520px;border:1px solid rgba(255,255,255,.14);border-radius:24px;padding:28px;background:#1d1d1f;box-shadow:0 12px 36px rgba(0,0,0,.35)}
    h1{margin:0 0 12px;font-size:32px;color:#f2c34a;letter-spacing:.02em}
    p{margin:0 0 20px;color:#c9c9d1;font-size:18px;line-height:1.35}
    a{display:inline-block;padding:14px 22px;border-radius:16px;background:#f2c34a;color:#111;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <div class="card">
    <h1>Easy Gym Plan</h1>
    <p>Opening Easy Gym...</p>
    <a id="openLink" href="./">Open Plan</a>
  </div>
  <script>
    (function(){
      var target = './' + (location.search || '') + (location.hash || '');
      var link = document.getElementById('openLink');
      if(link) link.href = target;
      setTimeout(function(){ location.replace(target); }, 80);
    })();
  </script>
</body>
</html>
